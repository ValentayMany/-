<!DOCTYPE html>
<html lang="lo">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ເຂົ້າສູ່ລະບົບ - ລະບົບບັນທຶກເວນ</title>
  <meta name="description" content="ລ໋ອກອິນເຂົ້າສູ່ລະບົບບັນທຶກເວນພະຍາບານ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Lao:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-app: #0b0f19;
      --bg-card: rgba(17, 24, 39, 0.85);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: hsl(190, 95%, 45%);
      --primary-hover: hsl(190, 95%, 38%);
      --error: #ef4444;
      --font-body: 'Inter', 'Noto Sans Lao', 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-app);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .bg-blur-1 {
      position: absolute;
      top: -10%;
      left: 10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
      z-index: 0;
      pointer-events: none;
    }

    .bg-blur-2 {
      position: absolute;
      bottom: 10%;
      right: 5%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
      z-index: 0;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 1.5rem;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      background: rgba(6, 182, 212, 0.12);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: var(--primary);
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
    }

    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #06b6d4, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.35rem;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .form-group input {
      width: 100%;
      background: #1f2937;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--primary);
    }

    .form-group input::placeholder {
      color: #4b5563;
    }

    .password-container {
      position: relative;
      width: 100%;
    }

    .password-container input {
      padding-right: 2.75rem !important;
    }

    .toggle-password-btn {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem;
      border-radius: 0.375rem;
      transition: color 0.2s, background-color 0.2s;
    }

    .toggle-password-btn:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #06b6d4, #10b981);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .btn-login:active {
      transform: scale(0.99);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="bg-blur-1"></div>
  <div class="bg-blur-2"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
          </svg>
        </div>
        <h1>ລະບົບບັນທຶກເວນ</h1>
        <p>Nurse &amp; Staff Duty Roster System</p>
      </div>

      <div id="login-error" class="error-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">ຊື່ພະແນກ ຫຼື ຜູ້ດູແລ (Department or Admin)</label>
          <input type="text" id="login-email" placeholder="ຕົວຢ່າງ: SOUKLATY, ພະຍາບານ, ພາຍໃນ..." required
            autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="password-container">
            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" id="toggle-password" class="toggle-password-btn" title="ສະແດງ/ຊ່ອນລະຫັດຜ່ານ">
              <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="login-btn">
          <span class="spinner" id="login-spinner"></span>
          <span id="login-btn-text">ເຂົ້າສູ່ລະບົບ</span>
        </button>
      </form>

      <div class="login-footer">
        &copy; 2026 Hospital Duty Management System
      </div>
    </div>
  </div>

  <script>
    // Global local username prefix mapping
    const localPrefixMap = {
      'ການຢາ': 'Pharmacy',
      'ພະຍາບານ': 'Nurse',
      'ພາຍໃນ': 'Internal medicine',
      'ເດັກນ້ອຍ': 'Pediatric Department',
      'ວິເຄາະ': 'Laboratory Department',
      'ໂຊເຟີ': 'Chauffeur',
      'ຜູ້ດູແລ': 'Admin'
    };

    // Initialize auth (always use backend session)
    function initLogin() {
      // Check if already logged in
      const localSession = localStorage.getItem('mock_session');
      if (localSession) {
        window.location.href = '/index.html';
        return;
      }

      // Handle login form
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const usernameInput = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        // Resolve input name dynamically through the local prefix map (e.g. "ການຢາ1" -> "Pharmacy1")
        let resolvedUsername = usernameInput;
        for (const [laoKey, engValue] of Object.entries(localPrefixMap)) {
          if (usernameInput.startsWith(laoKey)) {
            resolvedUsername = engValue + usernameInput.substring(laoKey.length);
            break;
          }
        }

        setLoading(true);
        hideError();

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: resolvedUsername, password })
          });

          const result = await res.json();

          if (!res.ok) {
            setLoading(false);
            showError(result.error || 'ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ');
            return;
          }

          // Save active user session
          localStorage.setItem('mock_session', JSON.stringify(result.user));
          window.location.href = '/index.html';
        } catch (err) {
          setLoading(false);
          showError('ເກີດຂໍ້ຜິດພາດໃນການເຊື່ອມຕໍ່ກັບເຊີບເວີ');
        }
      });
    }

    // Toggle Password Visibility
    document.getElementById('toggle-password').addEventListener('click', function() {
      const passwordInput = document.getElementById('login-password');
      const eyeIcon = document.getElementById('eye-icon');
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      if (type === 'text') {
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    });

    function setLoading(loading) {
      document.getElementById('login-btn').disabled = loading;
      document.getElementById('login-spinner').style.display = loading ? 'block' : 'none';
      document.getElementById('login-btn-text').textContent = loading ? 'ກຳລັງໂຫລດ...' : 'ເຂົ້າສູ່ລະບົບ';
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('login-error').style.display = 'none';
    }

    initLogin();
  </script>
</body>

</html>
